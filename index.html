  <style>

      --paper: #fbfcfa;

      --accent: #0f766e;
      --accent-2: #b3261e;
      --node: #f5c542;
      --review: #2f7dd1;
      --edge: rgba(35, 50, 47, 0.25);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--paper); color: var(--ink); font: 15px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { overflow: hidden; }
    button, input, select, textarea { font: inherit; }
    button { min-height: 42px; border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 7px; padding: 9px 11px; }
    button.primary { border-color: var(--accent); background: var(--accent); color: white; font-weight: 700; }
    button.danger { border-color: #e7b8b4; color: var(--accent-2); }
    input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 10px; background: white; color: var(--ink); }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
    .app { height: 100dvh; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; }
    header { padding: calc(10px + env(safe-area-inset-top)) 12px 10px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.96); }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-size: 18px; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 10px; }
    main { position: relative; min-height: 0; }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; background: #f7faf7; }
    .hint { position: absolute; left: 10px; top: 10px; padding: 6px 8px; background: rgba(255,255,255,.84); border: 1px solid var(--line); border-radius: 7px; color: var(--muted); font-size: 12px; pointer-events: none; }
    .sheet { max-height: 46dvh; overflow: auto; padding: 10px 12px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: rgba(255,255,255,.98); }
    .selected { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; padding-bottom: 10px; border-bottom: 1px solid var(--line); margin-bottom: 10px; }
    .selected h2 { margin: 0 0 3px; font-size: 17px; letter-spacing: 0; }
    .selected p { margin: 0; color: var(--muted); font-size: 13px; }
    .form { display: grid; gap: 9px; }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 9px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .results { max-height: 132px; overflow: auto; margin-top: 8px; border: 1px solid var(--line); border-radius: 7px; background: white; }
    .result { width: 100%; display: block; min-height: 38px; border: 0; border-bottom: 1px solid var(--line); border-radius: 0; text-align: left; background: white; }
    .result:last-child { border-bottom: 0; }
    .export { margin-top: 8px; min-height: 92px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; }
    .status { margin-top: 6px; color: var(--muted); font-size: 12px; min-height: 17px; }
    @media (min-width: 760px) {
      .app { grid-template-columns: minmax(0, 1fr) 360px; grid-template-rows: auto minmax(0, 1fr); }
      header { grid-column: 1 / -1; }
      .sheet { max-height: none; height: 100%; border-top: 0; border-left: 1px solid var(--line); }
    }
  </style>
</head>

  <div class="app">
    <header>

        <div class="meta"><span id="changeCount">0</span> changes</div>

      <div class="search-row">

      </div>
      <div id="searchResults" class="results" hidden></div>

    <main>
      <canvas id="graphCanvas"></canvas>
      <div class="hint">Drag to pan. Pinch to zoom. Tap a word.</div>

    <section class="sheet">
      <div class="selected">
        <div>
          <h2 id="selectedTitle">No word selected</h2>
          <p id="selectedMeta">Tap a node or choose from search.</p>
        </div>
        <button id="centerButton" type="button">Center</button>
      </div>
      <form id="addForm" class="form">
        <div class="form-grid">
          <label>New word
            <input id="newWordText" autocomplete="off" placeholder="Display text">
          </label>
          <label>Optional connection
            <select id="connectionSelect"></select>
          </label>
        </div>
        <button class="primary" type="submit">Add mobile entry</button>
      </form>
      <div class="actions" style="margin-top:10px">
        <button id="exportButton" type="button">Copy/export mobile changes</button>
        <button id="resetButton" class="danger" type="button">Reset mobile changes</button>
      </div>
      <textarea id="exportText" class="export" readonly hidden></textarea>
      <div id="saveStatus" class="status"></div>
    </section>
  </div>

        ctx.strokeStyle = edge.mobile ? "rgba(47,125,209,.72)" : "rgba(35,50,47,.22)";
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      });
      nodes.forEach((node) => {
        const selected = node.id === selectedId;
        const r = selected ? 10 : node.mobile ? 8 : 6;
        ctx.fillStyle = node.mobile ? "#2f7dd1" : "#f5c542";
        ctx.strokeStyle = selected ? "#111" : "rgba(20,32,30,.55)";
        ctx.lineWidth = selected ? 2.5 / transform.scale : 1 / transform.scale;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        if (selected || transform.scale > 0.7 || node.mobile) {
          ctx.fillStyle = "#14201e";
          ctx.font = `${Math.max(11, 13 / transform.scale)}px system-ui, sans-serif`;
          ctx.fillText(node.display_text, node.x + r + 3, node.y + 4);
        }
      });
      ctx.restore();
    }

    function animationLoop() {
      tickLayout();
      draw();
      requestAnimationFrame(animationLoop);
    }

    function fitGraph(targetIds) {
      const rect = canvas.getBoundingClientRect();
      const visible = targetIds?.length ? targetIds.map((id) => nodesById.get(id)).filter(Boolean) : nodes;
      if (!visible.length || !rect.width || !rect.height) return;
      const xs = visible.map((node) => node.x);
      const ys = visible.map((node) => node.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const spanX = Math.max(80, maxX - minX);
      const spanY = Math.max(80, maxY - minY);
      const scale = Math.max(0.12, Math.min(2.2, Math.min((rect.width - 44) / spanX, (rect.height - 44) / spanY)));
      transform.scale = scale;
      transform.x = rect.width / 2 - ((minX + maxX) / 2) * scale;
      transform.y = rect.height / 2 - ((minY + maxY) / 2) * scale;
      needsDraw = true;
    }

    function selectNode(id, center = false) {
      const node = nodesById.get(id);
      if (!node) return;
      selectedId = id;
      document.getElementById("selectedTitle").textContent = node.display_text;
      document.getElementById("selectedMeta").textContent = `${node.word_id} | ${node.status || "no status"}${node.mobile ? " | mobile addition" : ""}`;
      document.getElementById("connectionSelect").value = id;
      if (center) {
        const rect = canvas.getBoundingClientRect();
        transform.x = rect.width / 2 - node.x * transform.scale;
        transform.y = rect.height / 2 - node.y * transform.scale;
      }
      needsDraw = true;
    }

    function hitTest(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const world = screenToWorld({ x: clientX - rect.left, y: clientY - rect.top });
      let best = null;
      let bestDistance = 14 / transform.scale;
      nodes.forEach((node) => {
        const distance = Math.hypot(node.x - world.x, node.y - world.y);
        if (distance < bestDistance) {
          best = node;
          bestDistance = distance;
        }
      });
      return best;
    }

    function pointerPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    canvas.addEventListener("pointerdown", (event) => {
      canvas.setPointerCapture(event.pointerId);
      pointers.set(event.pointerId, pointerPoint(event));
      if (pointers.size === 1) {
        gesture = { type: "pan", start: pointerPoint(event), tx: transform.x, ty: transform.y, moved: false };
      } else if (pointers.size === 2) {
        const points = [...pointers.values()];
        const mid = { x: (points[0].x + points[1].x) / 2, y: (points[0].y + points[1].y) / 2 };
        gesture = { type: "pinch", distance: Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y), scale: transform.scale, world: screenToWorld(mid) };
      }
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!pointers.has(event.pointerId)) return;
      pointers.set(event.pointerId, pointerPoint(event));
      if (gesture?.type === "pan" && pointers.size === 1) {
        const point = pointerPoint(event);
        const dx = point.x - gesture.start.x;
        const dy = point.y - gesture.start.y;
        gesture.moved = gesture.moved || Math.hypot(dx, dy) > 7;
        transform.x = gesture.tx + dx;
        transform.y = gesture.ty + dy;
      } else if (gesture?.type === "pinch" && pointers.size === 2) {
        const points = [...pointers.values()];
        const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y) || 1;
        const mid = { x: (points[0].x + points[1].x) / 2, y: (points[0].y + points[1].y) / 2 };
        transform.scale = Math.max(0.08, Math.min(4, gesture.scale * distance / gesture.distance));
        transform.x = mid.x - gesture.world.x * transform.scale;
        transform.y = mid.y - gesture.world.y * transform.scale;
      }
      needsDraw = true;
    });

    function finishPointer(event) {
      const wasTap = gesture?.type === "pan" && !gesture.moved && pointers.size === 1;
      pointers.delete(event.pointerId);
      if (wasTap) {
        const node = hitTest(event.clientX, event.clientY);
        if (node) selectNode(node.id);
      }
      gesture = null;
    }
    canvas.addEventListener("pointerup", finishPointer);
    canvas.addEventListener("pointercancel", finishPointer);

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const point = pointerPoint(event);
      const world = screenToWorld(point);
      const factor = Math.exp(-event.deltaY * 0.001);
      transform.scale = Math.max(0.08, Math.min(4, transform.scale * factor));
      transform.x = point.x - world.x * transform.scale;
      transform.y = point.y - world.y * transform.scale;
      needsDraw = true;
    }, { passive: false });

    function updateStatus(message) {
      document.getElementById("changeCount").textContent = String(changes.additions.length);
      const last = changes.lastSaved ? new Date(changes.lastSaved).toLocaleString() : "Not saved yet";
      document.getElementById("saveStatus").textContent = message || `Last saved: ${last}`;
    }

    function refreshConnectionSelect() {
      const select = document.getElementById("connectionSelect");
      const current = select.value || selectedId;
      select.innerHTML = '<option value="">No connection</option>' + nodes
        .slice()
        .sort((a, b) => a.display_text.localeCompare(b.display_text))
        .map((node) => `<option value="${node.id.replace(/"/g, "&quot;")}">${node.display_text}</option>`)
        .join("");
      if (current && nodesById.has(current)) select.value = current;
    }

    function searchWords() {
      const query = normalizeText(document.getElementById("searchInput").value).toLowerCase();
      const box = document.getElementById("searchResults");
      if (!query) {
        box.hidden = true;
        box.innerHTML = "";
        return;
      }
      const matches = nodes.filter((node) =>
        [node.word_id, node.display_text, node.canonical_text, node.forms].join(" ").toLowerCase().includes(query)
      ).slice(0, 24);
      box.innerHTML = matches.map((node) => `<button class="result" type="button" data-id="${node.id.replace(/"/g, "&quot;")}">${node.display_text}<br><small>${node.word_id}</small></button>`).join("");
      box.hidden = false;
    }

    document.getElementById("searchResults").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-id]");
      if (!button) return;
      selectNode(button.dataset.id, true);
      document.getElementById("searchResults").hidden = true;
    });
    document.getElementById("searchInput").addEventListener("input", searchWords);
    document.getElementById("fitButton").addEventListener("click", () => fitGraph());
    document.getElementById("centerButton").addEventListener("click", () => selectedId && selectNode(selectedId, true));

    document.getElementById("addForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const text = normalizeText(document.getElementById("newWordText").value);
      if (!text) {
        updateStatus("Enter a word display text first.");
        return;
      }
      const base = "mobile_" + slugify(text);
      let id = base;
      let suffix = 1;
      while (nodesById.has(id)) {
        suffix += 1;
        id = `${base}_${suffix}`;
      }
      const connectedTo = document.getElementById("connectionSelect").value;
      const wordRow = makeWordRow(id, text);
      const connectionRow = connectedTo ? makeConnectionRow(`mobile_e_${Date.now()}_${changes.additions.length + 1}`, connectedTo, id) : null;
      const addition = { createdAt: new Date().toISOString(), wordRow, connectionRow };
      changes.additions.push(addition);
      applyAddition(addition);
      saveChanges();
      refreshConnectionSelect();
      selectNode(id, true);
      document.getElementById("newWordText").value = "";
      updateStatus("Saved mobile addition locally.");
    });

    function exportPlainText() {
      const lines = [
        "Wordlinks mobile changes",
        `Generated: ${new Date().toISOString()}`,
        `Source snapshot: ${BASE_DATA.sourceFiles.words}, ${BASE_DATA.sourceFiles.connections}`,
        "",
        "[words.csv]",
        BASE_DATA.wordColumns.join(","),
        ...changes.additions.map((addition) => csvLine(addition.wordRow, BASE_DATA.wordColumns)),
        "",
        "[connections.csv]",
        BASE_DATA.connectionColumns.join(","),
        ...changes.additions.filter((addition) => addition.connectionRow).map((addition) => csvLine(addition.connectionRow, BASE_DATA.connectionColumns)),
      ];
      return lines.join("\n");
    }

    document.getElementById("exportButton").addEventListener("click", async () => {
      const text = exportPlainText();
      const box = document.getElementById("exportText");
      box.hidden = false;
      box.value = text;
      box.focus();
      box.select();
      let copied = false;
      try {
        await navigator.clipboard.writeText(text);
        copied = true;
      } catch (_error) {
        try { copied = document.execCommand("copy"); } catch (__error) { copied = false; }
      }
      updateStatus(copied ? "Copied export text." : "Export text selected. Use Copy from the edit menu.");
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!changes.additions.length) {
        updateStatus("No mobile changes to reset.");
        return;
      }
      if (!confirm("Reset all mobile changes stored on this device?")) return;
      localStorage.removeItem(STORAGE_KEY);
      changes = { additions: [], lastSaved: "" };
      location.reload();
    });

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
    seedLayout();
    refreshConnectionSelect();
    updateStatus();
    requestAnimationFrame(animationLoop);
  </script>
</body>
</html>
